name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "src/ces-dashboard.tsx"
      - "src/main.tsx"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build:dashboard

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-dashboard

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
